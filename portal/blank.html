<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Auth redirect</title>
  <!-- MSAL silent-auth iframe redirect handler — no visible content, no user interaction. -->
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <script>
    (new msal.PublicClientApplication({
      auth: {
        clientId: '9fbfaf21-76dd-40f7-aa3f-cf2ecc6a9c91',
        authority: 'https://login.microsoftonline.com/f43cfd98-c931-4d4c-95f3-9616cc2bee83',
        redirectUri: window.location.origin + '/blank.html'
      }
    })).handleRedirectPromise().catch(function(){});
  </script>
</head>
<body></body>
</html>
